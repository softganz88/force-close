name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        force-close is deliberately minimal and safety-first. Features that
        widen the blast radius of a process-killing tool, or add scope beyond
        "inspect and force-close stuck X11 windows", are unlikely to land —
        but a clear problem statement is always welcome.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What can't you do today, or what's painful? Describe the situation, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like force-close to do? How would it behave in the TUI / CLI?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, existing tools, or workarounds you've tried.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and this isn't already requested.
          required: true
        - label: This stays within the tool's scope (X11 stuck-window recovery), not a general process manager.
          required: false
